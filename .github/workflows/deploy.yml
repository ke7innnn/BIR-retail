name: Deploy to VPS

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/services/BIR-retail
            
            git pull origin main

            cd backend

            # Stop and remove existing container if running
            docker stop bir-retail-backend || true
            docker rm bir-retail-backend || true

            # Build backend docker image
            docker build -t bir-retail-backend .

            # Run container with Host Networking (shares VPS network namespace directly)
            docker run -d \
              --name bir-retail-backend \
              --network host \
              --restart always \
              --env-file .env \
              bir-retail-backend \
              uvicorn app.main:app --host 0.0.0.0 --port 8003

